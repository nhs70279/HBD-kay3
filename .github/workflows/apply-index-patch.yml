name: Apply index patch

on:
  push:
    paths:
      - patch-trigger.txt

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fix thiefRoom text string and keep input hidden
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          p = Path('index.html')
          s = p.read_text(encoding='utf-8')

          safe = "アジトに潜入すると、奪われた特製ケーキを守るように抱きかかえる、Kayのことが大好きなウサギの妖精「ラビ」がいた。\\n\\n「……盗むつもりじゃなかったもん。ボク、Kayのことが大好きだから、いちばんキラキラした誕生日にしてあげたかったんだよぅ……。でも、どうしたら喜んでくれるかわからなくて……ケーキを見たら、これだ！って思っちゃったの……」\\n\\nラビはケーキをぎゅっと抱えて、少しだけ気まずそうにしている。優しく声をかけて、Kayの誕生日スタッフとして誘ってみよう！"

          pattern = r"(thiefRoom:\s*\{\s*location:\s*'アジトの内部（対峙フェーズ）',\s*text:\s*)'(?P<body>.*?)'(,\s*render\(\)\s*\{)"
          replacement = r"\1'" + safe + r"'\3"
          s, n = re.subn(pattern, replacement, s, count=1, flags=re.S)
          if n != 1:
              raise SystemExit(f'thiefRoom text replacement failed: {n}')

          s = s.replace("document.getElementById('ai-input-panel').classList.add('visible');", "document.getElementById('ai-input-panel').classList.remove('visible');")
          p.write_text(s, encoding='utf-8')
          PY
      - name: Commit patched index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Fix thiefRoom text escaping"
            git push
          fi
