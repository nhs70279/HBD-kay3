name: Patch HBD Kay dialogue

on:
  push:
    paths:
      - '.github/workflows/patch-hbd-dialogue.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch index.html dialogue and hide input panel
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          s = p.read_text(encoding='utf-8')

          new_scene_text = """アジトに潜入すると、奪われた特製ケーキを守るように抱きかかえる、Kayのことが大好きなウサギの妖精「ラビ」がいた。\n\n「……盗むつもりじゃなかったもん。ボク、Kayのことが大好きだから、いちばんキラキラした誕生日にしてあげたかったんだよぅ……。でも、どうしたら喜んでくれるかわからなくて……ケーキを見たら、これだ！って思っちゃったの……」\n\nラビはケーキをぎゅっと抱えて、少しだけ気まずそうにしている。優しく声をかけて、Kayの誕生日スタッフとして誘ってみよう！"""

          old_scene_start = """text: 'アジトに潜入すると、奪われた特製ケーキを守るように抱きかかえる、寂しがり屋のウサギの妖精「ラビ」がいた。\n\n「うぅ……ごめんなさい、ボク、誰もお誕生日を祝ってくれなくてすっごく寂しかったんだ……おいしそうなケーキを1回でお腹いっぱい食べてみたくて……」\n\n彼は怯えて震えている。説得チャット交渉を始めよう！',"""
          new_scene_start = """text: '""" + new_scene_text.replace("'", "\\'") + """',"""
          if old_scene_start not in s:
              raise SystemExit('target thiefRoom scene text not found')
          s = s.replace(old_scene_start, new_scene_start)

          old_panel = """document.getElementById('ai-input-panel').classList.add('visible');"""
          if old_panel not in s:
              raise SystemExit('ai input panel add visible statement not found')
          s = s.replace(old_panel, """document.getElementById('ai-input-panel').classList.remove('visible');""", 1)

          old_chat = """box.innerHTML = `<div class="chat-msg-labi"><span class="chat-name">ラビ:</span> うぅぅ…ごめんなさい、ボク怒られるのすごく怖いよぅ……。ボクだって誰かとお祝いしたかっただけんだもん……。</div>`;"""
          new_chat = """box.innerHTML = `<div class="chat-msg-labi"><span class="chat-name">ラビ:</span> ……盗むつもりじゃなかったもん。ボク、Kayのことが大好きだから、いちばんキラキラした誕生日にしてあげたかったんだよぅ……。でも、ケーキを勝手に運んだのは……ちょっとだけ、いや、かなりダメだったかも……。</div>`;"""
          if old_chat not in s:
              raise SystemExit('target initAiChat line not found')
          s = s.replace(old_chat, new_chat)

          old_history_user = """{ role:'user', parts:[{ text:'ゲームの状況：プレイヤー（ケーキ捜査官エージェント）が、寂しがりのウサギ妖精ラビ（あなた）のアジトを突き止めた。ラビは泣いて怯えている。穏和にケーキを返してもらい、仲間になるように対話する。' }] },"""
          new_history_user = """{ role:'user', parts:[{ text:'ゲームの状況：プレイヤー（ケーキ捜査官エージェント）が、Kayのことが大好きでサプライズを暴走させたウサギ妖精ラビ（あなた）のアジトを突き止めた。ラビは悪気はないが、ケーキを勝手に運んだことを少し反省している。優しく声をかけると、ケーキを返してKayの誕生日スタッフとして参加する。' }] },"""
          s = s.replace(old_history_user, new_history_user)

          old_history_model = """{ role:'model', parts:[{ text:'うぅぅ…ごめんなさい、ボク怒られるのすごく怖いよぅ……。ボクだって誰かとお祝いしたかっただけんだもん……。' }] }"""
          new_history_model = """{ role:'model', parts:[{ text:'……盗むつもりじゃなかったもん。ボク、Kayのことが大好きだから、いちばんキラキラした誕生日にしてあげたかったんだよぅ……。でも、ケーキを勝手に運んだのは……ちょっとだけ、いや、かなりダメだったかも……。' }] }"""
          s = s.replace(old_history_model, new_history_model)

          old_prompt_phrase = """あなたは誕生日ケーキをこっそり盗んでしまった、非常に寂しがり屋で繊細なウサギの妖精「ラビ」です。現在アジトでケーキを抱えて怯えています。"""
          new_prompt_phrase = """あなたはKayのことが大好きすぎて、最高のサプライズ誕生日を作ろうとしてケーキを勝手にアジトへ運んでしまったウサギの妖精「ラビ」です。現在アジトでケーキを抱えて、少し気まずそうにしています。"""
          s = s.replace(old_prompt_phrase, new_prompt_phrase)

          old_prompt_motive = """本当は悪い子ではなく、寂しいからお腹いっぱいケーキを食べたかった。"""
          new_prompt_motive = """本当は悪い子ではなく、Kayを喜ばせたくて張り切りすぎただけ。ケーキを独り占めしたいのではなく、最高のサプライズ会場に運んだつもり。"""
          s = s.replace(old_prompt_motive, new_prompt_motive)

          p.write_text(s, encoding='utf-8')
          PY
      - name: Remove one-shot workflow
        run: rm .github/workflows/patch-hbd-dialogue.yml
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/patch-hbd-dialogue.yml
          git commit -m "Update Labi dialogue and hide input box"
          git push
