<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BIRTHDAY AGENT - 極上ケーキ奪還作戦</title>
  <meta name="description" content="Kayの誕生日ケーキを奪還する謎解きアドベンチャーゲーム" />
</head>
<body>
<script>
(async () => {
  const html = await fetch('old.html?restore=' + Date.now()).then(r => r.text());

  const layoutFix = `<style>
    @media (max-width: 679px) {
      html, body {
        height: 100dvh !important;
        overflow: hidden !important;
      }
      .stage {
        width: 100vw !important;
        height: 100dvh !important;
        padding: 0 !important;
        align-items: stretch !important;
        justify-content: stretch !important;
      }
      .game-card {
        width: 100vw !important;
        max-width: none !important;
        height: 100dvh !important;
        max-height: none !important;
        border-radius: 0 !important;
        border-left: 0 !important;
        border-right: 0 !important;
      }
      .game-body {
        padding: .55rem !important;
        gap: .55rem !important;
      }
      .visual-area {
        min-height: 260px !important;
        flex: 1.08 1 0 !important;
      }
      .visual-area svg {
        width: 98% !important;
        height: 98% !important;
        max-width: none !important;
        max-height: none !important;
      }
      .narration-area {
        min-height: 300px !important;
        padding: .9rem !important;
      }
      .action-panel {
        padding-bottom: max(.55rem, env(safe-area-inset-bottom)) !important;
      }
      .mic-status {
        margin-bottom: .65rem;
        padding: .65rem .8rem;
        border-radius: 16px;
        background: rgba(255,255,255,.82);
        border: 1px solid rgba(212,163,115,.35);
        color: var(--text-muted);
        font-weight: 700;
        font-size: .78rem;
        line-height: 1.5;
        text-align: center;
      }
    }
  </style>`;

  const blowMicCode = `
    let micStream = null;
    let micSource = null;
    let micAnalyser = null;
    let micRAF = null;
    let blowFrames = 0;
    let blowCooldown = false;

    function setMicStatus(message) {
        const actionPanel = document.getElementById('action-panel');
        if (!actionPanel) return;
        let el = document.getElementById('mic-status');
        if (!el) {
            el = document.createElement('div');
            el.id = 'mic-status';
            el.className = 'mic-status';
            actionPanel.prepend(el);
        }
        el.textContent = message;
    }

    async function startBlowDetection() {
        if (micStream || state.currentScene !== 'celebration') return;
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            setMicStatus('🎤 このブラウザではマイク検出が使えません。ロウソクをタップして消してね。');
            return;
        }
        setMicStatus('🎤 マイク許可をお願いします。許可したら、スマホ下部のマイクに向かってふーっと吹いてね。');
        try {
            if (audioCtx.state === 'suspended') await audioCtx.resume();
            micStream = await navigator.mediaDevices.getUserMedia({
                audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }
            });
            micSource = audioCtx.createMediaStreamSource(micStream);
            micAnalyser = audioCtx.createAnalyser();
            micAnalyser.fftSize = 1024;
            micSource.connect(micAnalyser);
            const data = new Uint8Array(micAnalyser.fftSize);
            setMicStatus('🎤 準備OK！スマホ下部のマイクに向かって「ふーっ」と吹いてね。タップでも消せます。');

            function tick() {
                if (!micAnalyser || state.currentScene !== 'celebration') return;
                micAnalyser.getByteTimeDomainData(data);
                let sum = 0;
                let peak = 0;
                for (let i = 0; i < data.length; i++) {
                    const v = Math.abs(data[i] - 128);
                    sum += v * v;
                    if (v > peak) peak = v;
                }
                const rms = Math.sqrt(sum / data.length) / 128;
                const peakNorm = peak / 128;
                const isBlow = rms > 0.075 || (peakNorm > 0.34 && rms > 0.05);
                blowFrames = isBlow ? blowFrames + 1 : Math.max(0, blowFrames - 1);

                if (blowFrames >= 3 && !blowCooldown) {
                    const idx = state.candlesLit.findIndex(Boolean);
                    if (idx >= 0) {
                        blowCooldown = true;
                        blowFrames = 0;
                        setMicStatus('💨 ふーっ！ロウソクが消えた！');
                        blowCandle(idx);
                        setTimeout(() => {
                            blowCooldown = false;
                            if (state.currentScene === 'celebration' && state.candlesLit.some(Boolean)) {
                                setMicStatus('🎤 次もスマホ下部のマイクに向かって、もう一回ふーっと吹いてね。');
                            }
                        }, 900);
                    }
                }
                micRAF = requestAnimationFrame(tick);
            }
            tick();
        } catch (e) {
            setMicStatus('🎤 マイクが許可されませんでした。ロウソクはタップでも消せます。');
        }
    }

    function stopBlowDetection() {
        if (micRAF) cancelAnimationFrame(micRAF);
        micRAF = null;
        micAnalyser = null;
        micSource = null;
        blowFrames = 0;
        blowCooldown = false;
        if (micStream) {
            micStream.getTracks().forEach(track => track.stop());
            micStream = null;
        }
    }
`;

  const oldScene = `text: 'アジトに潜入すると、奪われた特製ケーキを守るように抱きかかえる、寂しがり屋のウサギの妖精「ラビ」がいた。\\n\\n「うぅ……ごめんなさい、ボク、誰もお誕生日を祝ってくれなくてすっごく寂しかったんだ……おいしそうなケーキを1回でお腹いっぱい食べてみたくて……」\\n\\n彼は怯えて震えている。説得チャット交渉を始めよう！',`;
  const newScene = `text: 'アジトに潜入すると、奪われた特製ケーキを守るように抱きかかえる、Kayのことが大好きなウサギの妖精「ラビ」がいた。\\n\\nラビはケーキをぎゅっと抱えて、少しだけ気まずそうにしている。\\nどうやらKayさんを喜ばせたくて、サプライズ準備を暴走させてしまったらしい。\\n\\n優しく声をかけて、Kayの誕生日スタッフとして誘ってみよう！',`;

  const oldChat = `box.innerHTML = \`<div class="chat-msg-labi"><span class="chat-name">ラビ:</span> うぅぅ…ごめんなさい、ボク怒られるのすごく怖いよぅ……。ボクだって誰かとお祝いしたかっただけんだもん……。</div>\`;`;
  const newChat = `box.innerHTML = \`<div class="chat-msg-labi"><span class="chat-name">ラビ:</span> ……盗むつもりじゃなかったもん。ボク、Kayのことが大好きだから、いちばんキラキラした誕生日にしてあげたかったんだよぅ……。でも、ケーキを勝手に運んだのは……ちょっとだけ、いや、かなりダメだったかも……。</div>\`;`;

  const oldShopText = `text: '落ち着いた外観の雑貨屋。ショーウィンドウには地元名産の果物が並んでいる。店主に話しかけてみよう。\\n\\nまずは【輝くイチゴ】のケースをタップして確認しよう。',`;
  const newShopText = `text() {
                if (hasItem('極上イチゴ')) return '店主から、ラビの好物「極上イチゴ」を受け取った。\\n\\nこれでラビに優しく声をかける準備はできた。次はマップに戻って、公園の手がかりやアジトの鍵を探そう。';
                return '落ち着いた外観の雑貨屋。ショーウィンドウには地元名産の果物が並んでいる。店主に話しかけてみよう。\\n\\nまずは【輝くイチゴ】のケースをタップして確認しよう。';
            },`;

  const oldDecoratingCream = `for (let i = 0; i < state.decorations.creams; i++) {
                const x = 125 + i * 22;
                crSvg += \`<path class="scene-fade" d="M\${x} 205 Q\${x+8} 191 \${x+16} 205 Q\${x+18} 208 \${x+16} 210 L\${x} 210 Q\${x-2} 208 \${x} 205 Z" fill="#FAF8F5" stroke="#D4C0A0" stroke-width="1.5"/>\`;
            }`;
  const newDecoratingCream = `for (let i = 0; i < state.decorations.creams; i++) {
                const x = 116 + i * 24;
                crSvg += \`<g class="scene-fade">
                    <path d="M\${x} 160 C\${x+2} 151 \${x+7} 146 \${x+12} 146 C\${x+17} 146 \${x+22} 151 \${x+24} 160 C\${x+20} 166 \${x+4} 166 \${x} 160 Z" fill="#FFF6E8" stroke="#C89B6D" stroke-width="2"/>
                    <path d="M\${x+5} 158 Q\${x+12} 151 \${x+19} 158" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity=".75"/>
                </g>\`;
            }`;

  const patched = html
    .replace('</head>', layoutFix + '</head>')
    .replace(oldScene, newScene)
    .replace(oldShopText, newShopText)
    .replace("document.getElementById('ai-input-panel').classList.add('visible');", "document.getElementById('ai-input-panel').classList.remove('visible');")
    .replace(oldChat, newChat)
    .replace(oldDecoratingCream, newDecoratingCream)
    .replace('<!-- Cake body -->\n            <g class="floating" filter="url(#cake-shadow)">', '<!-- Cake body -->\n            <g class="floating" filter="url(#cake-shadow)" transform="translate(200 205) scale(1.18) translate(-200 -205)">')
    .replace('<!-- Cake body -->\n            <g class="floating" filter="url(#cel-shadow)">', '<!-- Cake body -->\n            <g class="floating" filter="url(#cel-shadow)" transform="translate(200 200) scale(1.18) translate(-200 -200)">')
    .replace('<g id="candle-${i}" class="interactive-el" onclick="clickSceneElement(\'candle_${i}\')">', '<g id="candle-${i}" class="interactive-el" onclick="clickSceneElement(\'candle_${i}\')">\n                    <circle cx="${x}" cy="132" r="28" fill="transparent" style="pointer-events:all;"/>')
    .replace('g.gain.linearRampToValueAtTime(0.03,now+0.02);', 'g.gain.linearRampToValueAtTime(0.085,now+0.02);')
    .replace('// ==========================================\n    // DECORATION\n    // ==========================================', '// ==========================================\n    // BLOW MIC DETECTION\n    // ==========================================' + blowMicCode + '\n\n    // ==========================================\n    // DECORATION\n    // ==========================================')
    .replace('function finishDecorating() { playSound(\'fanfare\'); changeScene(\'celebration\',\'forward\'); }', 'function finishDecorating() { playSound(\'fanfare\'); changeScene(\'celebration\',\'forward\'); startBlowDetection(); }')
    .replace('（ケーキの上のロウソクをタップして、息を吹きかけて消してね！）', '（スマホ下部のマイクに向かって息を吹きかけると火が消えるよ！タップでも消せます🕯️）')
    .replace('if (state.candlesLit.every(l => !l)) {', 'if (state.candlesLit.every(l => !l)) {\n            stopBlowDetection();')
    .replace('function resetGame() {\n        stopConfetti(); stopMusic();', 'function resetGame() {\n        stopBlowDetection(); stopConfetti(); stopMusic();')
    .replace('ゲームの状況：プレイヤー（ケーキ捜査官エージェント）が、寂しがりのウサギ妖精ラビ（あなた）のアジトを突き止めた。ラビは泣いて怯えている。穏和にケーキを返してもらい、仲間になるように対話する。', 'ゲームの状況：プレイヤー（ケーキ捜査官エージェント）が、Kayのことが大好きでサプライズを暴走させたウサギ妖精ラビ（あなた）のアジトを突き止めた。ラビは悪気はないが、ケーキを勝手に運んだことを少し反省している。優しく声をかけると、ケーキを返してKayの誕生日スタッフとして参加する。')
    .replace('うぅぅ…ごめんなさい、ボク怒られるのすごく怖いよぅ……。ボクだって誰かとお祝いしたかっただけんだもん……。', '……盗むつもりじゃなかったもん。ボク、Kayのことが大好きだから、いちばんキラキラした誕生日にしてあげたかったんだよぅ……。でも、ケーキを勝手に運んだのは……ちょっとだけ、いや、かなりダメだったかも……。')
    .replace('あなたは誕生日ケーキをこっそり盗んでしまった、非常に寂しがり屋で繊細なウサギの妖精「ラビ」です。現在アジトでケーキを抱えて怯えています。', 'あなたはKayのことが大好きすぎて、最高のサプライズ誕生日を作ろうとしてケーキを勝手にアジトへ運んでしまったウサギの妖精「ラビ」です。現在アジトでケーキを抱えて、少し気まずそうにしています。')
    .replace('本当は悪い子ではなく、寂しいからお腹いっぱいケーキを食べたかった。', '本当は悪い子ではなく、Kayを喜ばせたくて張り切りすぎただけ。ケーキを独り占めしたいのではなく、最高のサプライズ会場に運んだつもり。')
    .replace('【 ${state.playerName} 】、本当にお誕生日おめでとうございます！🎂✨', '【Kayさん、お誕生日おめでとう🎊💕】');

  document.open();
  document.write(patched);
  document.close();
})();
</script>
</body>
</html>
