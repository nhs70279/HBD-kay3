<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIRTHDAY AGENT - 極上ケーキ奪還作戦</title>
    <meta name="description" content="今日のミッション：消えた誕生日ケーキを奪還せよ！謎解きアドベンチャーゲーム">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Inter:wght@300;400;600;700&family=Noto+Sans+JP:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        /* ===== CSS Design Tokens ===== */
        :root {
            --bg:           #F5EFEB;
            --bg-2:         #EDE4DC;
            --surface:      rgba(255,255,255,0.75);
            --surface-2:    rgba(255,255,255,0.45);
            --border:       rgba(255,255,255,0.6);
            --border-2:     rgba(212,163,115,0.25);

            --text-primary:   #2D2420;
            --text-secondary: #6B5C52;
            --text-muted:     #A39281;

            --accent:       #C4825A;       /* warm amber-rose */
            --accent-2:     #8B6E5E;       /* muted mocha */
            --accent-3:     #D4A373;       /* gold */
            --accent-rose:  #E07070;       /* rose */
            --accent-sage:  #9FB88D;       /* sage green */

            --radius-sm:    .75rem;
            --radius:       1.25rem;
            --radius-lg:    2rem;

            --shadow-sm: 0 2px 12px rgba(45,36,32,.08);
            --shadow:    0 8px 32px rgba(45,36,32,.12);
            --shadow-lg: 0 20px 60px rgba(45,36,32,.18);

            --ease-out-expo: cubic-bezier(0.16,1,0.3,1);
            --ease-bounce:   cubic-bezier(0.34,1.56,0.64,1);
        }

        /* ===== Reset & Base ===== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            touch-action: manipulation;
            -webkit-font-smoothing: antialiased;
        }

        /* ===== Scrollbar ===== */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--accent-3); border-radius: 99px; }

        /* ===== Animated Background ===== */
        .bg-stage {
            position: fixed; inset: 0; z-index: 0;
            overflow: hidden; pointer-events: none;
        }
        .orb {
            position: absolute; border-radius: 50%;
            filter: blur(80px); opacity: .55;
            will-change: transform;
        }
        .orb-1 {
            width: 55vw; height: 55vw;
            top: -15%; left: -15%;
            background: radial-gradient(circle, #EADCC9 0%, #E6C9A8 100%);
            animation: orbFloat1 14s ease-in-out infinite;
        }
        .orb-2 {
            width: 65vw; height: 65vw;
            bottom: -20%; right: -20%;
            background: radial-gradient(circle, #E0D3C8 0%, #CFC2B5 100%);
            animation: orbFloat2 18s ease-in-out infinite;
        }
        .orb-3 {
            width: 40vw; height: 40vw;
            top: 30%; left: 55%;
            background: radial-gradient(circle, #CCD5AE60 0%, transparent 70%);
            animation: orbFloat3 11s ease-in-out infinite;
        }

        @keyframes orbFloat1 {
            0%,100% { transform: translate(0,0) scale(1); }
            50%      { transform: translate(4vw, 3vw) scale(1.07); }
        }
        @keyframes orbFloat2 {
            0%,100% { transform: translate(0,0) scale(1); }
            50%      { transform: translate(-3vw,-4vw) scale(1.05); }
        }
        @keyframes orbFloat3 {
            0%,100% { transform: translate(0,0) scale(1); opacity:.3; }
            50%      { transform: translate(-2vw,2vw) scale(1.1); opacity:.5; }
        }

        /* Stars / sparkle particles */
        .sparkles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        .sparkle {
            position: absolute; border-radius: 50%;
            background: var(--accent-3); opacity: 0;
            animation: twinkle var(--dur, 4s) ease-in-out var(--delay, 0s) infinite;
        }
        @keyframes twinkle {
            0%,100% { opacity:0; transform: scale(.5); }
            50%      { opacity:.7; transform: scale(1); }
        }

        /* ===== Confetti Canvas ===== */
        #confetti-canvas {
            position: fixed; inset: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 100;
        }

        /* ===== Layout ===== */
        .stage {
            position: relative; z-index: 10;
            display: flex; align-items: center; justify-content: center;
            width: 100%; height: 100vh;
            padding: .75rem;
        }

        /* ===== Game Card (Glassmorphism) ===== */
        .game-card {
            position: relative;
            width: 100%; max-width: 900px;
            height: 94vh; max-height: 820px;
            display: flex; flex-direction: column;
            background: var(--surface);
            backdrop-filter: blur(24px) saturate(1.6);
            -webkit-backdrop-filter: blur(24px) saturate(1.6);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg), inset 0 1px 0 rgba(255,255,255,.8);
            overflow: hidden;
            animation: cardReveal .7s var(--ease-out-expo) both;
        }
        @keyframes cardReveal {
            from { opacity:0; transform: translateY(20px) scale(.97); }
            to   { opacity:1; transform: translateY(0) scale(1); }
        }

        /* Shimmer border glow */
        .game-card::before {
            content: '';
            position: absolute; inset: 0;
            border-radius: inherit;
            padding: 1.5px;
            background: linear-gradient(135deg, rgba(255,255,255,.8) 0%, rgba(212,163,115,.4) 50%, rgba(255,255,255,.6) 100%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor; mask-composite: exclude;
            pointer-events: none; z-index: 1;
        }

        /* ===== Header ===== */
        .game-header {
            display: none;
            align-items: center; justify-content: space-between;
            padding: .75rem 1.25rem;
            border-bottom: 1px solid rgba(230,223,211,.6);
            background: rgba(255,255,255,.35);
            z-index: 20; flex-shrink: 0;
        }
        .game-header.visible { display: flex; }

        .status-dot {
            display: inline-block; width: 8px; height: 8px;
            border-radius: 50%; background: var(--accent-rose);
            margin-right: .5rem;
            animation: ping 1.5s ease-in-out infinite;
        }
        @keyframes ping {
            0%,100% { opacity:1; transform:scale(1); }
            50%      { opacity:.4; transform:scale(1.4); }
        }
        .status-label {
            font-family: 'Cinzel', serif;
            font-size: .6rem; letter-spacing: .2em;
            text-transform: uppercase;
            color: var(--text-secondary); font-weight: 700;
        }

        /* Progress Bar */
        .progress-wrap {
            flex: 1; max-width: 200px;
            display: flex; align-items: center; gap: .5rem;
            margin: 0 1rem;
        }
        .progress-label {
            font-size: .55rem; letter-spacing: .12em; text-transform: uppercase;
            color: var(--text-muted); font-weight: 700; white-space: nowrap;
        }
        .progress-track {
            flex: 1; height: 4px;
            background: rgba(212,163,115,.2);
            border-radius: 99px; overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-3), var(--accent));
            border-radius: 99px;
            transition: width .6s var(--ease-out-expo);
        }

        /* Inventory */
        .inventory {
            display: flex; align-items: center; gap: .5rem;
        }
        .inv-label {
            font-size: .55rem; letter-spacing: .15em; text-transform: uppercase;
            color: var(--text-muted); font-weight: 700;
        }
        .inv-slots { display: flex; gap: .35rem; }
        .inv-slot {
            width: 34px; height: 34px;
            border-radius: .6rem;
            border: 1.5px solid rgba(230,223,211,.5);
            background: rgba(255,255,255,.4);
            display: flex; align-items: center; justify-content: center;
            font-size: .9rem; opacity: .35;
            transition: all .25s var(--ease-bounce);
            cursor: default; position: relative;
        }
        .inv-slot.filled {
            opacity: 1; border-color: var(--accent-3);
            background: rgba(250,248,245,.7);
            transform: scale(1.05);
            box-shadow: 0 2px 8px rgba(196,130,90,.2);
        }
        .inv-slot.filled:hover .inv-tooltip { display: block; }
        .inv-tooltip {
            display: none; position: absolute; bottom: calc(100% + 6px); left: 50%;
            transform: translateX(-50%);
            background: var(--text-primary); color: #fff;
            font-size: .6rem; white-space: nowrap;
            padding: .3rem .6rem; border-radius: .5rem;
            pointer-events: none; z-index: 99;
        }
        .inv-tooltip::after {
            content: '';
            position: absolute; top: 100%; left: 50%;
            transform: translateX(-50%);
            border: 4px solid transparent; border-top-color: var(--text-primary);
        }

        /* ===== Game Body ===== */
        .game-body {
            flex: 1; display: flex; flex-direction: column;
            overflow: hidden;
        }
        @media (min-width: 680px) {
            .game-body { flex-direction: row; padding: 1.25rem; gap: 1.25rem; }
        }
        @media (max-width: 679px) {
            .game-body { padding: .75rem; gap: .75rem; }
        }

        /* Visual Area */
        .visual-area {
            flex: 1;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #FAF8F5 0%, #F2EDE7 100%);
            border-radius: var(--radius);
            border: 1px solid rgba(235,228,216,.8);
            overflow: hidden; position: relative;
            box-shadow: inset 0 2px 8px rgba(45,36,32,.05);
            min-height: 200px;
        }
        @media (min-width: 680px) {
            .visual-area { width: 50%; flex: none; }
        }

        /* Narration Area */
        .narration-area {
            display: flex; flex-direction: column;
            justify-content: space-between;
            background: rgba(255,255,255,.3);
            border-radius: var(--radius);
            border: 1px solid rgba(240,234,225,.7);
            padding: 1rem; overflow: hidden;
            min-height: 220px;
        }
        @media (min-width: 680px) {
            .narration-area { width: 50%; flex: none; }
        }

        .location-tag {
            font-size: .6rem; letter-spacing: .2em; text-transform: uppercase;
            font-weight: 700; color: var(--text-muted);
            margin-bottom: .5rem;
        }
        .location-tag span {
            display: inline-block;
            padding: .2rem .6rem;
            background: rgba(212,163,115,.15);
            border-radius: 99px; border: 1px solid rgba(212,163,115,.3);
        }

        .text-log {
            flex: 1; overflow-y: auto;
            padding-right: .25rem;
        }

        #dialogue-text {
            font-size: .8rem; line-height: 1.75;
            color: #3D3530; white-space: pre-line; font-weight: 500;
        }

        /* Typewriter cursor */
        .cursor {
            display: inline-block; width: 2px; height: 1em;
            background: var(--accent); vertical-align: middle;
            margin-left: 1px; animation: blink .7s step-end infinite;
        }
        @keyframes blink {
            0%,100% { opacity:1; }
            50%      { opacity:0; }
        }

        /* Chat Box */
        .ai-chat-box {
            display: none; flex-direction: column;
            gap: .5rem; margin-top: .75rem;
            padding-top: .75rem;
            border-top: 1px solid rgba(235,228,216,.8);
            font-size: .75rem;
        }
        .ai-chat-box.visible { display: flex; }

        .chat-msg-labi {
            background: rgba(250,248,245,.9);
            border: 1px solid rgba(235,228,216,.8);
            border-radius: var(--radius-sm);
            padding: .5rem .75rem; line-height: 1.55;
            color: #5E4E42;
        }
        .chat-msg-labi .chat-name {
            font-weight: 700; color: var(--accent-rose); margin-right: .3rem;
        }
        .chat-msg-player {
            background: rgba(196,130,90,.12);
            border: 1px solid rgba(196,130,90,.2);
            border-radius: var(--radius-sm);
            padding: .5rem .75rem; line-height: 1.55;
            color: var(--text-primary);
            align-self: flex-end; max-width: 92%; text-align: right;
        }
        .chat-loading {
            background: rgba(250,248,245,.9);
            border: 1px solid rgba(235,228,216,.8);
            border-radius: var(--radius-sm);
            padding: .5rem .75rem; color: var(--text-muted); font-style: italic;
        }

        /* Action Panel */
        .action-area {
            margin-top: .75rem; display: flex; flex-direction: column; gap: .5rem;
            flex-shrink: 0;
        }

        /* AI input */
        .ai-input-panel {
            display: none; gap: .5rem; align-items: center;
            background: rgba(255,255,255,.7);
            border: 1.5px solid rgba(230,223,211,.8);
            border-radius: var(--radius-sm); padding: .4rem .5rem;
        }
        .ai-input-panel.visible { display: flex; }
        .ai-input {
            flex: 1; background: transparent; border: none; outline: none;
            font-size: .75rem; color: var(--text-primary);
            font-family: inherit; padding: .35rem .5rem;
        }
        .ai-input::placeholder { color: var(--text-muted); }
        .ai-send-btn {
            background: var(--accent-2); color: #fff; border: none; cursor: pointer;
            padding: .45rem .9rem; border-radius: .65rem;
            font-size: .7rem; font-weight: 700; font-family: inherit;
            transition: background .2s, transform .15s var(--ease-bounce);
        }
        .ai-send-btn:hover { background: var(--accent); transform: scale(1.04); }
        .ai-send-btn:active { transform: scale(.97); }

        /* Action panel buttons */
        #action-panel { display: flex; flex-direction: column; gap: .45rem; }

        /* Button base */
        .btn {
            width: 100%; padding: .75rem 1rem;
            border-radius: var(--radius-sm); border: none; cursor: pointer;
            font-size: .72rem; font-weight: 700; font-family: inherit;
            letter-spacing: .04em; transition: all .2s var(--ease-out-expo);
            position: relative; overflow: hidden;
            display: flex; align-items: center; justify-content: center; gap: .4rem;
        }
        .btn::after {
            content: '';
            position: absolute; inset: 0; border-radius: inherit;
            background: rgba(255,255,255,0);
            transition: background .15s;
        }
        .btn:hover::after { background: rgba(255,255,255,.12); }
        .btn:active { transform: scale(.97); }

        /* Ripple effect on click */
        .btn-ripple {
            position: absolute; border-radius: 50%;
            background: rgba(255,255,255,.4);
            transform: scale(0); animation: ripple .5s linear;
            pointer-events: none;
        }
        @keyframes ripple {
            to { transform: scale(4); opacity: 0; }
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-2) 0%, var(--accent) 100%);
            color: #fff;
            box-shadow: 0 4px 14px rgba(196,130,90,.35);
        }
        .btn-primary:hover { box-shadow: 0 6px 20px rgba(196,130,90,.45); transform: translateY(-1px); }

        .btn-secondary {
            background: rgba(255,255,255,.6);
            border: 1.5px solid rgba(230,223,211,.9);
            color: var(--accent-2);
        }
        .btn-secondary:hover { background: rgba(255,255,255,.8); }

        .btn-rose {
            background: linear-gradient(135deg, #E07070 0%, #C15A5A 100%);
            color: #fff;
            box-shadow: 0 4px 14px rgba(224,112,112,.3);
        }
        .btn-rose:hover { box-shadow: 0 6px 20px rgba(224,112,112,.4); transform: translateY(-1px); }

        .btn-sage {
            background: linear-gradient(135deg, #CCD5AE 0%, #9FB88D 100%);
            color: #3A4A30;
            box-shadow: 0 4px 14px rgba(159,184,141,.25);
        }

        .btn-disabled {
            background: rgba(220,215,210,.5);
            color: rgba(120,110,100,.5);
            cursor: not-allowed; pointer-events: none;
        }

        /* Name input */
        .name-input-wrap { margin-bottom: .75rem; }
        .name-label {
            display: block; font-size: .62rem; font-weight: 700;
            color: var(--accent-2); letter-spacing: .12em; text-transform: uppercase;
            margin-bottom: .4rem;
        }
        .name-input {
            width: 100%; padding: .7rem 1rem;
            border: 1.5px solid rgba(212,163,115,.4);
            border-radius: var(--radius-sm);
            background: rgba(255,255,255,.8);
            font-size: .8rem; font-weight: 700; font-family: inherit;
            color: var(--text-primary); outline: none;
            transition: border-color .2s, box-shadow .2s;
        }
        .name-input:focus {
            border-color: var(--accent-3);
            box-shadow: 0 0 0 3px rgba(212,163,115,.15);
        }

        /* Map grid */
        .map-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: .6rem; padding: .75rem;
        }
        .map-node {
            padding: .9rem .75rem; border-radius: var(--radius-sm);
            text-align: center; cursor: pointer;
            border: 1.5px solid rgba(212,163,115,.35);
            background: rgba(250,248,245,.8);
            transition: all .25s var(--ease-out-expo);
        }
        .map-node:hover { transform: translateY(-2px); box-shadow: var(--shadow-sm); }
        .map-node-icon { font-size: 1.3rem; display: block; margin-bottom: .2rem; }
        .map-node-name { font-size: .7rem; font-weight: 700; color: var(--accent-2); }
        .map-node-sub { font-size: .58rem; color: var(--text-muted); margin-top: .1rem; }
        .map-node.locked {
            opacity: .45; cursor: not-allowed; pointer-events: none;
            border-style: dashed;
        }
        .map-node.active-loc {
            border-color: var(--accent-3);
            background: rgba(212,163,115,.12);
        }

        /* Plate text input */
        .plate-input-wrap { margin-bottom: .6rem; }
        .plate-label {
            display: block; font-size: .6rem; font-weight: 700;
            color: var(--accent-2); letter-spacing: .1em; text-transform: uppercase;
            margin-bottom: .3rem;
        }
        .plate-input {
            width: 100%; padding: .5rem .75rem;
            border: 1.5px solid rgba(212,163,115,.3);
            border-radius: .65rem;
            background: rgba(255,255,255,.7);
            font-size: .75rem; font-weight: 700; font-family: inherit;
            color: var(--text-primary); outline: none;
            transition: border-color .2s;
        }
        .plate-input:focus { border-color: var(--accent-3); }

        /* ===== Footer ===== */
        .game-footer {
            border-top: 1px solid rgba(240,234,225,.8);
            padding: .5rem 1.25rem;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,.35);
            font-size: .58rem; color: var(--text-muted);
            flex-shrink: 0; z-index: 20;
        }
        .footer-id {
            font-weight: 700; letter-spacing: .15em; text-transform: uppercase;
        }
        .footer-controls { display: flex; align-items: center; gap: .75rem; }
        .footer-btn {
            background: none; border: none; cursor: pointer;
            font-size: .58rem; color: var(--text-muted); font-family: inherit;
            font-weight: 700; display: flex; align-items: center; gap: .25rem;
            transition: color .2s;
        }
        .footer-btn:hover { color: var(--accent-2); }

        /* ===== SVG Interactive Elements ===== */
        .interactive-el { cursor: pointer; }
        .interactive-el:hover { filter: brightness(1.12) drop-shadow(0 0 5px rgba(212,163,115,.5)); }

        /* ===== Scene Animations ===== */
        .floating {
            animation: float 4s ease-in-out infinite;
        }
        @keyframes float {
            0%,100% { transform: translateY(0) rotate(0deg); }
            50%      { transform: translateY(-7px) rotate(.8deg); }
        }

        .flame {
            animation: flicker 1.1s infinite alternate ease-in-out;
            transform-origin: center bottom;
        }
        @keyframes flicker {
            0%   { transform: scale(1) rotate(-2deg); fill: #FF8A5B; }
            50%  { transform: scale(1.1) rotate(2deg); fill: #FF5A5F; }
            100% { transform: scale(.96) rotate(-1deg); fill: #FFB356; }
        }

        .scene-fade {
            animation: sceneFade .45s var(--ease-out-expo) both;
        }
        @keyframes sceneFade {
            from { opacity:0; transform: scale(.97); }
            to   { opacity:1; transform: scale(1); }
        }

        /* Item gain pop effect */
        .item-gain-flash {
            animation: itemFlash .5s var(--ease-bounce) both;
        }
        @keyframes itemFlash {
            0%   { transform: scale(.5); opacity:0; }
            60%  { transform: scale(1.2); opacity:1; }
            100% { transform: scale(1.05); opacity:1; }
        }

        /* Title logo */
        .title-logo {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem; font-weight: 800;
            letter-spacing: .15em; text-transform: uppercase;
            background: linear-gradient(135deg, #C4825A 0%, #8B6E5E 50%, #D4A373 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: .3rem;
        }
        .title-sub {
            font-size: .6rem; letter-spacing: .25em; text-transform: uppercase;
            color: var(--text-muted); font-weight: 600;
        }

        /* Item gain notification */
        .item-notify {
            display: inline-block; padding: .2rem .6rem;
            background: linear-gradient(135deg, rgba(212,163,115,.2), rgba(196,130,90,.1));
            border: 1px solid rgba(212,163,115,.4);
            border-radius: 99px; font-weight: 700; color: var(--accent);
            font-size: .72rem;
        }

        /* View Transition */
        @keyframes slide-from-right { from { transform: translateX(18px); opacity:0; } }
        @keyframes slide-to-left    { to   { transform: translateX(-18px); opacity:0; } }
        @keyframes slide-from-left  { from { transform: translateX(-18px); opacity:0; } }
        @keyframes slide-to-right   { to   { transform: translateX(18px); opacity:0; } }

        ::view-transition-group(root) { animation: .35s var(--ease-out-expo) both; }

        html:active-view-transition-type(forward)::view-transition-old(root) { animation-name: slide-to-left; }
        html:active-view-transition-type(forward)::view-transition-new(root) { animation-name: slide-from-right; }
        html:active-view-transition-type(backward)::view-transition-old(root) { animation-name: slide-to-right; }
        html:active-view-transition-type(backward)::view-transition-new(root) { animation-name: slide-from-left; }

        /* Reduced motion */
        @media (prefers-reduced-motion: reduce) {

    // ==========================================
    // AUDIO ENGINE

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    const happyBirthdayMelody = [

    function playSound(type) {
        if (isMuted) return;
        try {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const now = audioCtx.currentTime;
            if (type === 'click') {
                const o = audioCtx.createOscillator(), g = audioCtx.createGain();
                o.connect(g); g.connect(audioCtx.destination);
                o.type = 'sine'; o.frequency.setValueAtTime(620, now); o.frequency.exponentialRampToValueAtTime(310, now+0.1);
                g.gain.setValueAtTime(0.07, now); g.gain.linearRampToValueAtTime(0.001, now+0.1);
                o.start(now); o.stop(now+0.12);
            } else if (type === 'item') {
                [523.25,659.25,783.99,1046.50].forEach((f,i) => {
                    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
                    o.connect(g); g.connect(audioCtx.destination);
                    o.type = 'triangle'; o.frequency.setValueAtTime(f, now+i*.07);
                    g.gain.setValueAtTime(0.06, now+i*.07); g.gain.exponentialRampToValueAtTime(0.001, now+i*.07+0.25);
                    o.start(now+i*.07); o.stop(now+i*.07+0.3);
                });
            } else if (type === 'fanfare') {
                [523.25,659.25,783.99,987.77,1046.50].forEach((f,i) => {
                    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
                    o.connect(g); g.connect(audioCtx.destination);
                    o.type = 'sine'; o.frequency.setValueAtTime(f, now+i*.05);
                    g.gain.setValueAtTime(0.05, now+i*.05); g.gain.exponentialRampToValueAtTime(0.001, now+i*.05+1.5);
                    o.start(now+i*.05); o.stop(now+i*.05+1.8);
                });
            } else if (type === 'blow') {
                const sz = audioCtx.sampleRate*0.3, buf = audioCtx.createBuffer(1,sz,audioCtx.sampleRate);
                const d = buf.getChannelData(0);
                for (let i=0;i<sz;i++) d[i]=Math.random()*2-1;
                const ns = audioCtx.createBufferSource(); ns.buffer = buf;
                const flt = audioCtx.createBiquadFilter(); flt.type='lowpass';
                flt.frequency.setValueAtTime(600,now); flt.frequency.exponentialRampToValueAtTime(80,now+0.3);
                const ng = audioCtx.createGain(); ng.gain.setValueAtTime(0.12,now); ng.gain.linearRampToValueAtTime(0.001,now+0.3);
                ns.connect(flt); flt.connect(ng); ng.connect(audioCtx.destination);
                ns.start(now); ns.stop(now+0.3);
            } else if (type === 'rustle') {
                const o = audioCtx.createOscillator(), g = audioCtx.createGain();
                o.connect(g); g.connect(audioCtx.destination);
                o.type = 'triangle'; o.frequency.setValueAtTime(120,now); o.frequency.exponentialRampToValueAtTime(40,now+0.15);
                g.gain.setValueAtTime(0.1,now); g.gain.linearRampToValueAtTime(0.001,now+0.15);

            if (!isMusicPlaying) return;
            const note = happyBirthdayMelody[currentNoteIndex];
            const now = audioCtx.currentTime;
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.connect(g); g.connect(audioCtx.destination);
            o.type = 'sine'; o.frequency.setValueAtTime(note[0],now);
            g.gain.setValueAtTime(0,now); g.gain.linearRampToValueAtTime(0.03,now+0.02);

            currentNoteIndex = (currentNoteIndex+1) % happyBirthdayMelody.length;

    function initAiChat() {

    async function sendChatMessage() {
        const input = document.getElementById('ai-user-text');
        const message = input.value.trim();
        if (!message) return;
        input.value = '';
        playSound('click');

        const box = document.getElementById('ai-chat-box');
        box.innerHTML += `<div class="chat-msg-player">${escapeHTML(message)}</div>`;
        const loadId = 'load-' + Date.now();
        box.innerHTML += `<div id="${loadId}" class="chat-loading">ラビが考え中…</div>`;
        scrollLogToBottom();

        const apiKey = '';
        const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
        const systemPrompt = `あなたはKayのことが大好きすぎて、最高のサプライズ誕生日を作ろうとしてケーキを勝手にアジトへ運んでしまったウサギの妖精「ラビ」です。現在アジトでケーキを抱えて、少し気まずそうにしています。プレイヤーがあなたを説得しようとしています。ラビのルール：一人称は「ボク」。おどおどした幼児のような可愛い口調（「〜だよぅ」「〜だもん」「うぅ…」など）で答えてください。本当は悪い子ではなく、Kayを喜ばせたくて張り切りすぎただけ。ケーキを独り占めしたいのではなく、最高のサプライズ会場に運んだつもり。プレイヤーが「優しくしてくれる」「一緒に食べようと誘う」「怒らない」「友達になろう」などの優しいアプローチをすると大喜びして、ケーキを返して一緒にパーティーに参加することに同意します。同意した場合（説得が成功した場合）、会話テキストの最後に、必ず「[SUCCESS]」という特殊タグを1つ付加してください。プレイヤーが「警察を呼ぶ」「叱りつける」「威圧的」な場合、怯えて拒絶し、最後に必ず「[FAIL]」を付加してください。1回の応答は必ず短め（2〜3文、100文字以内）にまとめてください。`;

        chatHistory.push({ role:'user', parts:[{ text: message }] });

        try {
            const res = await fetch(apiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: chatHistory, systemInstruction: { parts: [{ text: systemPrompt }] } })
            });
            const data = await res.json();
            const aiReply = data?.candidates?.[0]?.content?.parts?.[0]?.text || 'うぅ、なんて言ったらいいか分からないよぅ……。';
            document.getElementById(loadId)?.remove();

            let reply = aiReply;
            const isSuccess = reply.includes('[SUCCESS]');
            const isFail = reply.includes('[FAIL]');
            reply = reply.replace('[SUCCESS]','').replace('[FAIL]','').trim();

            box.innerHTML += `<div class="chat-msg-labi"><span class="chat-name">ラビ:</span> ${escapeHTML(reply)}</div>`;
            scrollLogToBottom();
            chatHistory.push({ role:'model', parts:[{ text: aiReply }] });

            if (isSuccess) { setTimeout(() => { playSound('fanfare'); changeScene('decorating','forward'); }, 1200); }
        } catch(err) {
            document.getElementById(loadId)?.remove();
            let fallback = 'うぅ、ボクそんなに悪い子じゃないのにぃ……。';
            let success = false;
            if (/イチゴ|いちご|一緒|いいよ|友達|許す|おいで|やさしい|優しい|大好き|来て/.test(message)) {
                fallback = 'えっ！？本当に！？一緒にお祝いしてもいいの……！？うわぁぁん、ありがとうぉ！ボク、ケーキお返しするし、一緒にパーティー行きたい！';
                success = true;
            }
            box.innerHTML += `<div class="chat-msg-labi"><span class="chat-name">ラビ:</span> ${fallback}</div>`;
            scrollLogToBottom();
            if (success) { setTimeout(() => { playSound('fanfare'); changeScene('decorating','forward'); }, 1200); }
        }
    }

    function useStrawberryOnLabi() {
        playSound('fanfare'); removeItem('極上イチゴ');
        const box = document.getElementById('ai-chat-box');
        box.innerHTML += `<div class="chat-msg-player">🍓 極上イチゴをプレゼントした！「一緒に食べよう！」</div>`;
        setTimeout(() => {
            box.innerHTML += `<div class="chat-msg-labi"><span class="chat-name">ラビ:</span> うわぁぁぁ！これ、ボクが大好きな一番甘い高級いちごしゃん！！……うぅ、こんなに優しくしてもらえるなんて……ごめんなさい！ケーキ返すし、ボクもパーティーお手伝いするぅ！</div>`;
            scrollLogToBottom();
            setTimeout(() => changeScene('decorating','forward'), 1500);
        }, 500);
    }

    function forceReclaim() {
        playSound('click');
        const box = document.getElementById('ai-chat-box');
        box.innerHTML += `<div class="chat-msg-labi" style="border-color:rgba(224,112,112,.3);"><span class="chat-name" style="color:#E07070;">ラビ:</span> うわぁぁん！ごめんなさい、やっぱり怒られたぁ！！</div>`;
        scrollLogToBottom();
        const textLog = document.getElementById('dialogue-text');
        textLog.textContent = 'ラビはケーキをその場に置いたまま、号泣してどこかへ逃げてしまった。ミッションは遂行されたが、どこか心が痛む……。\n\n（もっと良いアプローチがあったのではないだろうか？）';
        document.getElementById('action-panel').innerHTML = `<button onclick="goToMap()" class="btn btn-secondary">📍 GPSマップに戻って捜査をやり直す</button>`;
    }

    // ==========================================
    // DECORATION
    // ==========================================
    function updatePlateText(val) {
        state.decorations.plateText = val;
        document.getElementById('visual-area').innerHTML = SVG.decorating();
    }
    function finishDecorating() { playSound('fanfare'); changeScene('celebration','forward'); }

    function blowCandle(idx) {
        if (!state.candlesLit[idx]) return;
        state.candlesLit[idx] = false; playSound('blow');
        document.getElementById('visual-area').innerHTML = SVG.celebration();
        if (state.candlesLit.every(l => !l)) {
            setTimeout(() => {
                playSound('fanfare');
                document.getElementById('dialogue-text').innerHTML = `
                    <span style="color:var(--accent-rose);font-weight:800;font-size:1.05rem;display:block;margin-bottom:.5rem;font-family:'Cinzel',serif;letter-spacing:.08em;">✨ HAPPY BIRTHDAY TO YOU !! ✨</span>
                    見事にすべてのキャンドルが吹き消されました！🎂🕵️🕯️\nこれであなたの新しい1年間は、幸せとワクワクに満ちた素晴らしいミッションで溢れることでしょう！\n\nラビやエージェント仲間と一緒に、最高にハッピーなお誕生日をお過ごしください！🎁🎉`;
            }, 600);
        }
    }

    // ==========================================
    // SCENE ELEMENT CLICKS
    // ==========================================
    function clickSceneElement(id) {
        if (id === 'open_fridge') { playSound('click'); state.searched.fridgeOpened = true; changeScene('fridge'); }
        else if (id === 'receipt') { gainItem('雑貨屋のレシート','📄','1時間前に発行されたレシート。'); state.unlocked.shop = true; changeScene('fridge'); }
        else if (id === 'mud') { gainItem('泥の跡','👣','水分を含んだ黒い泥の痕跡。'); state.unlocked.park = true; changeScene('fridge'); }
        else if (id === 'strawberry') {
            playSound('click'); state.searched.shopStrawberryChecked = true;
            document.getElementById('dialogue-text').textContent = '店主に特製ケーキ盗難について聞き取りを行うと、大慌てで言った。\n\n「ああっ、ケーキを泥棒したのだとしたらさっきの白いお耳のウサギの妖精さんだ！慌てて走って行ったよ！そういえばこれ、あの子がお祝い用に購入したお釣りを忘れていってね……お詫びと言ってはなんだが、彼の好物の【極上イチゴ】をお譲りしよう。説得の役に立てておくれ！」';
            gainItem('極上イチゴ','🍓','店主から授かったツヤツヤの極上いちご。');
            changeScene('shop');
        }
        else if (id === 'grass') { rustleGrass(); }
        else if (id === 'key') { gainItem('アジトの鍵','🔑','公園の茂みの奥に隠されていた真鍮製の鍵。'); state.searched.parkKeyFound = true; state.unlocked.hideout = true; changeScene('park'); }
        else if (id === 'add_strawberry') { if (state.decorations.strawberries < 5) { playSound('click'); state.decorations.strawberries++; document.getElementById('visual-area').innerHTML = SVG.decorating(); } }
        else if (id === 'add_cream') { if (state.decorations.creams < 7) { playSound('click'); state.decorations.creams++; document.getElementById('visual-area').innerHTML = SVG.decorating(); } }
        else if (id.startsWith('candle_')) { blowCandle(parseInt(id.split('_')[1])); }
    }

    function rustleGrass() { playSound('rustle'); state.searched.parkGrassRustleCount++; changeScene('park'); }

    // ==========================================
    // CONFETTI
    // ==========================================
    let confettiActive = false;
    const confettis = [];
    const confettiColors = ['#E27373','#CCD5AE','#D4A373','#FAF8F5','#EBE4D8','#F0A8A8','#B8CE98'];
    const confettiShapes = ['rect','circle','triangle'];

    function startConfetti() {
        confettiActive = true;
        const canvas = document.getElementById('confetti-canvas');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const ctx = canvas.getContext('2d');
        confettis.length = 0;
        for (let i = 0; i < 100; i++) {
            confettis.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height - canvas.height,
                size: Math.random() * 7 + 4,
                color: confettiColors[Math.floor(Math.random() * confettiColors.length)],
                shape: confettiShapes[Math.floor(Math.random() * confettiShapes.length)],
                speed: Math.random() * 2.5 + 1,
                drift: Math.random() * 1.5 - .75,
                rotation: Math.random() * 360,
                rotationSpeed: Math.random() * 5 - 2.5,
                opacity: .7 + Math.random() * .3
            });
        }
        function draw() {
            if (!confettiActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            confettis.forEach(c => {
                c.y += c.speed; c.x += c.drift; c.rotation += c.rotationSpeed;
                if (c.y > canvas.height) { c.y = -12; c.x = Math.random() * canvas.width; }
                if (c.x > canvas.width + 20) c.x = -20;
                if (c.x < -20) c.x = canvas.width + 20;
                ctx.save(); ctx.globalAlpha = c.opacity;
                ctx.translate(c.x, c.y); ctx.rotate(c.rotation * Math.PI / 180);
                ctx.fillStyle = c.color;
                if (c.shape === 'rect') { ctx.fillRect(-c.size/2, -c.size/2, c.size, c.size*.55); }
                else if (c.shape === 'circle') { ctx.beginPath(); ctx.arc(0, 0, c.size/2, 0, Math.PI*2); ctx.fill(); }
                else { ctx.beginPath(); ctx.moveTo(0, -c.size/2); ctx.lineTo(c.size/2, c.size/2); ctx.lineTo(-c.size/2, c.size/2); ctx.closePath(); ctx.fill(); }
                ctx.restore();
            });
            requestAnimationFrame(draw);
        }
        draw();
    }

    function stopConfetti() {
        confettiActive = false;
        const canvas = document.getElementById('confetti-canvas');
        canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
        confettis.length = 0;
    }

    // ==========================================
    // HELPERS & SCENE ENGINE
    // ==========================================
    function showHeader() { document.getElementById('game-header').classList.add('visible'); }

    function updateInventoryUI() {
        for (let i = 0; i < 4; i++) {
            const slot = document.getElementById(`slot-${i}`);
            if (!slot) continue;
            const tip = slot.querySelector('.inv-tooltip');
            if (state.inventory[i]) {
                const item = state.inventory[i];
                slot.innerHTML = item.icon + '<div class="inv-tooltip"></div>';
                slot.querySelector('.inv-tooltip').textContent = `${item.name}: ${item.desc}`;
                slot.classList.add('filled');
                slot.setAttribute('aria-label', item.name);
                if (!slot.classList.contains('item-gain-flash')) {
                    slot.classList.add('item-gain-flash');
                    slot.addEventListener('animationend', () => slot.classList.remove('item-gain-flash'), { once: true });
                }
            } else {
                slot.innerHTML = '📁<div class="inv-tooltip"></div>';
                slot.classList.remove('filled','item-gain-flash');
                slot.setAttribute('aria-label', '空きスロット');
            }
        }
    }

    function hasItem(name) { return state.inventory.some(i => i.name === name); }
    function gainItem(name, icon, desc) {
        if (state.inventory.length >= 4) return false;
        state.inventory.push({ name, icon, desc });
        playSound('item');
        updateInventoryUI();
        const log = document.getElementById('dialogue-text');
        const orig = log.innerHTML;
        log.innerHTML = `<span class="item-notify">✨ 証拠品【${name}】を獲得！</span>\n\n` + orig;
        return true;
    }
    function removeItem(name) { state.inventory = state.inventory.filter(i => i.name !== name); updateInventoryUI(); }

    // Typewriter with cursor
    let typewriterTimer = null;
    function changeScene(sceneId, direction) {
        state.currentScene = sceneId;
        const scene = scenes[sceneId];
        document.getElementById('location-indicator').textContent = scene.location;

        // Update progress
        const prog = getProgress();
        const fill = document.getElementById('progress-fill');
        fill.style.width = prog + '%';
        fill.parentElement.setAttribute('aria-valuenow', prog);

        // Clear old text
        if (typewriterTimer) { clearTimeout(typewriterTimer); typewriterTimer = null; }
        const textEl = document.getElementById('dialogue-text');
        textEl.textContent = '';

        const rawText = typeof scene.text === 'function' ? scene.text() : scene.text;

        // View Transitions API
        function doUpdate() {
            scene.render();
            updateInventoryUI();
            // Typewriter
            let idx = 0;
            let displayed = '';
            const cursor = document.createElement('span');
            cursor.className = 'cursor'; cursor.setAttribute('aria-hidden','true');
            textEl.appendChild(cursor);
            function type() {
                if (state.currentScene !== sceneId) return;
                if (idx < rawText.length) {
                    displayed += rawText[idx];
                    textEl.textContent = displayed;
                    textEl.appendChild(cursor);
                    idx++;
                    typewriterTimer = setTimeout(type, 12);
                } else {
                    cursor.remove();
                }
            }
            type();
        }

        if (document.startViewTransition && direction) {
            document.startViewTransition({ update: doUpdate, types: [direction] });
        } else {
            doUpdate();
        }
    }

    function startGame() {
        state.playerName = 'Kay';
        state.decorations.plateText = 'HPB KAY';
        if (isMuted) toggleMute();
        startMusic();
        changeScene('fridge','forward');
    }

    function goToMap() { changeScene('map','forward'); }
    function unlockHideout() { playSound('click'); removeItem('アジトの鍵'); changeScene('thiefRoom','forward'); }

    function scrollLogToBottom() {
        const c = document.getElementById('text-log-container');
        setTimeout(() => { c.scrollTop = c.scrollHeight; }, 60);
    }

    function escapeHTML(s) {
        return s.replace(/[&<>'"]/g, t => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'": '&#39;','"': '&quot;'}[t] || t));
    }

    function resetGame() {
        stopConfetti(); stopMusic();
        Object.assign(state, {
            playerName: 'Kay', currentScene: 'title', inventory: [],
            unlocked: { shop:false, park:false, hideout:false },
            searched: { fridgeOpened:false, fridgeInsideChecked:false, mudChecked:false, parkGrassRustleCount:0, parkKeyFound:false, shopStrawberryChecked:false },
            aiNegotiationState: 'start',
            decorations: { strawberries:0, creams:0, plateText:'HAPPY BIRTHDAY' },
            candlesLit: [true, true, true]
        });
        changeScene('title');
    }

    window.onload = () => changeScene('title');
    </script>
