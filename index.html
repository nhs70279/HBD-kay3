<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BIRTHDAY AGENT - 極上ケーキ奪還作戦</title>
  <meta name="description" content="Kayの誕生日ケーキを奪還する謎解きアドベンチャーゲーム" />
</head>
<body>
<script>
(async () => {
  const html = await fetch('old.html?restore=' + Date.now()).then(r => r.text());

  const layoutFix = `<style>
    @media (max-width: 679px) {
      html, body {
        height: 100dvh !important;
        overflow: hidden !important;
      }
      .stage {
        width: 100vw !important;
        height: 100dvh !important;
        padding: 0 !important;
        align-items: stretch !important;
        justify-content: stretch !important;
      }
      .game-card {
        width: 100vw !important;
        max-width: none !important;
        height: 100dvh !important;
        max-height: none !important;
        border-radius: 0 !important;
        border-left: 0 !important;
        border-right: 0 !important;
      }
      .game-body {
        padding: .55rem !important;
        gap: .55rem !important;
      }
      .visual-area {
        min-height: 260px !important;
        flex: 1.08 1 0 !important;
      }
      .visual-area svg {
        width: 98% !important;
        height: 98% !important;
        max-width: none !important;
        max-height: none !important;
      }
      .narration-area {
        min-height: 300px !important;
        padding: .9rem !important;
      }
      .action-panel {
        padding-bottom: max(.55rem, env(safe-area-inset-bottom)) !important;
      }
    }
  </style>`;

  const oldScene = `text: 'アジトに潜入すると、奪われた特製ケーキを守るように抱きかかえる、寂しがり屋のウサギの妖精「ラビ」がいた。\\n\\n「うぅ……ごめんなさい、ボク、誰もお誕生日を祝ってくれなくてすっごく寂しかったんだ……おいしそうなケーキを1回でお腹いっぱい食べてみたくて……」\\n\\n彼は怯えて震えている。説得チャット交渉を始めよう！',`;
  const newScene = `text: 'アジトに潜入すると、奪われた特製ケーキを守るように抱きかかえる、Kayのことが大好きなウサギの妖精「ラビ」がいた。\\n\\nラビはケーキをぎゅっと抱えて、少しだけ気まずそうにしている。\\nどうやらKayさんを喜ばせたくて、サプライズ準備を暴走させてしまったらしい。\\n\\n優しく声をかけて、Kayの誕生日スタッフとして誘ってみよう！',`;

  const oldChat = `box.innerHTML = \`<div class="chat-msg-labi"><span class="chat-name">ラビ:</span> うぅぅ…ごめんなさい、ボク怒られるのすごく怖いよぅ……。ボクだって誰かとお祝いしたかっただけんだもん……。</div>\`;`;
  const newChat = `box.innerHTML = \`<div class="chat-msg-labi"><span class="chat-name">ラビ:</span> ……盗むつもりじゃなかったもん。ボク、Kayのことが大好きだから、いちばんキラキラした誕生日にしてあげたかったんだよぅ……。でも、ケーキを勝手に運んだのは……ちょっとだけ、いや、かなりダメだったかも……。</div>\`;`;

  const oldDecoratingCream = `for (let i = 0; i < state.decorations.creams; i++) {
                const x = 125 + i * 22;
                crSvg += \`<path class="scene-fade" d="M\${x} 205 Q\${x+8} 191 \${x+16} 205 Q\${x+18} 208 \${x+16} 210 L\${x} 210 Q\${x-2} 208 \${x} 205 Z" fill="#FAF8F5" stroke="#D4C0A0" stroke-width="1.5"/>\`;
            }`;
  const newDecoratingCream = `for (let i = 0; i < state.decorations.creams; i++) {
                const x = 116 + i * 24;
                crSvg += \`<g class="scene-fade">
                    <path d="M\${x} 160 C\${x+2} 151 \${x+7} 146 \${x+12} 146 C\${x+17} 146 \${x+22} 151 \${x+24} 160 C\${x+20} 166 \${x+4} 166 \${x} 160 Z" fill="#FFF6E8" stroke="#C89B6D" stroke-width="2"/>
                    <path d="M\${x+5} 158 Q\${x+12} 151 \${x+19} 158" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity=".75"/>
                </g>\`;
            }`;

  const patched = html
    .replace('</head>', layoutFix + '</head>')
    .replace(oldScene, newScene)
    .replace("document.getElementById('ai-input-panel').classList.add('visible');", "document.getElementById('ai-input-panel').classList.remove('visible');")
    .replace(oldChat, newChat)
    .replace(oldDecoratingCream, newDecoratingCream)
    .replace('<!-- Cake body -->\n            <g class="floating" filter="url(#cake-shadow)">', '<!-- Cake body -->\n            <g class="floating" filter="url(#cake-shadow)" transform="translate(200 205) scale(1.18) translate(-200 -205)">')
    .replace('<!-- Cake body -->\n            <g class="floating" filter="url(#cel-shadow)">', '<!-- Cake body -->\n            <g class="floating" filter="url(#cel-shadow)" transform="translate(200 200) scale(1.18) translate(-200 -200)">')
    .replace('<g id="candle-${i}" class="interactive-el" onclick="clickSceneElement(\'candle_${i}\')">', '<g id="candle-${i}" class="interactive-el" onclick="clickSceneElement(\'candle_${i}\')">\n                    <circle cx="${x}" cy="132" r="28" fill="transparent" style="pointer-events:all;"/>')
    .replace('ゲームの状況：プレイヤー（ケーキ捜査官エージェント）が、寂しがりのウサギ妖精ラビ（あなた）のアジトを突き止めた。ラビは泣いて怯えている。穏和にケーキを返してもらい、仲間になるように対話する。', 'ゲームの状況：プレイヤー（ケーキ捜査官エージェント）が、Kayのことが大好きでサプライズを暴走させたウサギ妖精ラビ（あなた）のアジトを突き止めた。ラビは悪気はないが、ケーキを勝手に運んだことを少し反省している。優しく声をかけると、ケーキを返してKayの誕生日スタッフとして参加する。')
    .replace('うぅぅ…ごめんなさい、ボク怒られるのすごく怖いよぅ……。ボクだって誰かとお祝いしたかっただけんだもん……。', '……盗むつもりじゃなかったもん。ボク、Kayのことが大好きだから、いちばんキラキラした誕生日にしてあげたかったんだよぅ……。でも、ケーキを勝手に運んだのは……ちょっとだけ、いや、かなりダメだったかも……。')
    .replace('あなたは誕生日ケーキをこっそり盗んでしまった、非常に寂しがり屋で繊細なウサギの妖精「ラビ」です。現在アジトでケーキを抱えて怯えています。', 'あなたはKayのことが大好きすぎて、最高のサプライズ誕生日を作ろうとしてケーキを勝手にアジトへ運んでしまったウサギの妖精「ラビ」です。現在アジトでケーキを抱えて、少し気まずそうにしています。')
    .replace('本当は悪い子ではなく、寂しいからお腹いっぱいケーキを食べたかった。', '本当は悪い子ではなく、Kayを喜ばせたくて張り切りすぎただけ。ケーキを独り占めしたいのではなく、最高のサプライズ会場に運んだつもり。')
    .replace('【 ${state.playerName} 】、本当にお誕生日おめでとうございます！🎂✨', '【Kayさん、お誕生日おめでとう🎊💕】');

  document.open();
  document.write(patched);
  document.close();
})();
</script>
</body>
</html>
