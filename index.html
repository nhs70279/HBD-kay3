<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BIRTHDAY AGENT - 極上ケーキ奪還作戦</title>
  <meta name="description" content="Kayの誕生日ケーキを奪還する、カオスかわいい謎解きミッションゲーム。" />
  <style>
    :root {
      --bg1:#fff6fb;
      --bg2:#fff2cf;
      --bg3:#e9f7ff;
      --ink:#30252d;
      --muted:#7b6a77;
      --card:rgba(255,255,255,.78);
      --line:rgba(255,255,255,.72);
      --pink:#ff6fae;
      --yellow:#ffd166;
      --blue:#65c7f7;
      --green:#77dd77;
      --purple:#a78bfa;
      --red:#ff6b6b;
      --shadow:0 22px 80px rgba(82,45,83,.2);
      --radius:28px;
    }

    * { box-sizing:border-box; }
    html, body { height:100%; margin:0; overflow:hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
      color:var(--ink);
      background:
        radial-gradient(circle at 15% 10%, #ffffff 0 9%, transparent 10%),
        radial-gradient(circle at 85% 18%, #fff8a8 0 10%, transparent 11%),
        radial-gradient(circle at 12% 82%, #b9fbc0 0 12%, transparent 13%),
        radial-gradient(circle at 88% 80%, #a3cef1 0 12%, transparent 13%),
        linear-gradient(135deg, var(--bg1), var(--bg2) 45%, var(--bg3));
      touch-action: manipulation;
    }

    .blob {
      position:fixed;
      border-radius:999px;
      filter:blur(34px);
      opacity:.58;
      pointer-events:none;
      animation:float 9s ease-in-out infinite;
    }
    .b1 { width:260px; height:260px; background:#ff8fab; left:-60px; top:-40px; }
    .b2 { width:310px; height:310px; background:#90dbf4; right:-90px; bottom:-80px; animation-delay:-2s; }
    .b3 { width:210px; height:210px; background:#ffd166; right:24%; top:8%; animation-delay:-4s; }
    @keyframes float {
      0%,100% { transform:translate(0,0) scale(1); }
      50% { transform:translate(18px,-22px) scale(1.06); }
    }

    .app {
      position:relative;
      z-index:2;
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:14px;
    }

    .phone {
      width:min(960px, 100%);
      height:min(850px, 96vh);
      display:grid;
      grid-template-rows:auto 1fr auto;
      overflow:hidden;
      border:1px solid var(--line);
      border-radius:var(--radius);
      background:var(--card);
      box-shadow:var(--shadow), inset 0 1px 0 rgba(255,255,255,.8);
      backdrop-filter:blur(22px) saturate(1.4);
    }

    header {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:14px 16px;
      border-bottom:1px solid rgba(255,255,255,.8);
      background:rgba(255,255,255,.36);
    }

    .brand {
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }
    .badge {
      width:42px; height:42px;
      display:grid; place-items:center;
      border-radius:16px;
      background:linear-gradient(135deg, var(--pink), var(--yellow));
      color:white;
      box-shadow:0 8px 20px rgba(255,111,174,.24);
      font-size:22px;
      flex:0 0 auto;
    }
    .brand h1 {
      margin:0;
      font-size:13px;
      letter-spacing:.14em;
      line-height:1.2;
      text-transform:uppercase;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .brand p {
      margin:3px 0 0;
      color:var(--muted);
      font-size:11px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .inventory {
      display:flex;
      align-items:center;
      gap:6px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }
    .chip {
      min-width:32px;
      min-height:32px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:4px 9px;
      border-radius:999px;
      background:rgba(255,255,255,.62);
      border:1px solid rgba(255,255,255,.82);
      color:var(--muted);
      font-size:16px;
      box-shadow:0 2px 8px rgba(0,0,0,.04);
    }
    .chip.filled { color:var(--ink); background:#fff; animation:pop .32s ease-out both; }
    @keyframes pop { from { transform:scale(.75); opacity:.2; } to { transform:scale(1); opacity:1; } }

    main {
      min-height:0;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:16px;
      padding:16px;
    }

    .visual, .story {
      min-height:0;
      border-radius:24px;
      background:rgba(255,255,255,.54);
      border:1px solid rgba(255,255,255,.84);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.8);
      overflow:hidden;
    }

    .visual {
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px;
    }
    .scene-art {
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      flex-direction:column;
      gap:14px;
      border-radius:22px;
      background:
        radial-gradient(circle at 30% 25%, rgba(255,255,255,.9), transparent 30%),
        linear-gradient(145deg, rgba(255,255,255,.7), rgba(255,255,255,.2));
      animation:fade .25s ease-out both;
    }
    .emoji-big {
      font-size:clamp(76px, 16vw, 150px);
      line-height:1;
      filter:drop-shadow(0 12px 18px rgba(65,42,70,.18));
      animation:wiggle 3.8s ease-in-out infinite;
    }
    .scene-label {
      max-width:92%;
      padding:9px 13px;
      border-radius:999px;
      background:rgba(255,255,255,.8);
      color:var(--muted);
      font-weight:800;
      font-size:12px;
      letter-spacing:.08em;
    }
    .mini-note {
      max-width:88%;
      font-size:13px;
      color:var(--muted);
      line-height:1.55;
    }
    @keyframes fade { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    @keyframes wiggle {
      0%,100% { transform:rotate(-2deg) translateY(0); }
      50% { transform:rotate(2deg) translateY(-8px); }
    }

    .story {
      display:grid;
      grid-template-rows:auto 1fr;
      padding:18px;
    }
    .loc {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:12px;
    }
    .loc strong {
      font-size:12px;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:var(--pink);
    }
    .progress {
      height:8px;
      width:112px;
      border-radius:999px;
      overflow:hidden;
      background:rgba(123,106,119,.13);
    }
    .progress span {
      display:block;
      height:100%;
      width:0%;
      border-radius:inherit;
      background:linear-gradient(90deg, var(--pink), var(--yellow), var(--green), var(--blue));
      transition:width .35s ease;
    }

    .text {
      overflow:auto;
      padding-right:4px;
      color:var(--ink);
      font-size:15px;
      line-height:1.85;
      white-space:pre-line;
    }
    .text b { color:#e94b88; }
    .text .log {
      display:block;
      margin:.6em 0;
      padding:.65em .8em;
      border-radius:16px;
      background:rgba(255,255,255,.64);
      border:1px dashed rgba(255,111,174,.35);
      color:#5b4653;
      font-size:13px;
      line-height:1.65;
    }

    footer {
      display:grid;
      grid-template-columns:1fr;
      gap:9px;
      padding:14px 16px 16px;
      border-top:1px solid rgba(255,255,255,.78);
      background:rgba(255,255,255,.28);
    }
    .actions {
      display:flex;
      flex-wrap:wrap;
      gap:9px;
    }

    button {
      border:0;
      border-radius:18px;
      padding:13px 15px;
      background:#fff;
      color:var(--ink);
      font-weight:800;
      font-size:14px;
      cursor:pointer;
      box-shadow:0 7px 18px rgba(72,45,76,.1);
      transition:transform .14s ease, box-shadow .14s ease, opacity .14s ease;
    }
    button:hover { transform:translateY(-2px); box-shadow:0 12px 26px rgba(72,45,76,.15); }
    button:active { transform:translateY(1px) scale(.99); }
    .primary { background:linear-gradient(135deg, var(--pink), var(--yellow)); color:white; }
    .blue { background:linear-gradient(135deg, var(--blue), var(--purple)); color:white; }
    .green { background:linear-gradient(135deg, var(--green), #b8f7d4); color:#274430; }
    .red { background:linear-gradient(135deg, #ff8f8f, var(--red)); color:white; }
    .ghost { background:rgba(255,255,255,.6); color:var(--muted); }
    .disabled { opacity:.45; pointer-events:none; }

    .toast {
      position:fixed;
      z-index:20;
      left:50%;
      bottom:22px;
      transform:translateX(-50%) translateY(20px);
      opacity:0;
      pointer-events:none;
      max-width:92%;
      padding:12px 16px;
      border-radius:999px;
      background:rgba(48,37,45,.9);
      color:white;
      font-weight:800;
      font-size:13px;
      box-shadow:0 12px 28px rgba(0,0,0,.18);
      transition:.24s ease;
    }
    .toast.show {
      opacity:1;
      transform:translateX(-50%) translateY(0);
    }

    .confetti {
      position:fixed;
      inset:0;
      pointer-events:none;
      overflow:hidden;
      z-index:15;
    }
    .piece {
      position:absolute;
      width:10px; height:16px;
      border-radius:4px;
      animation:fall 1.25s ease-in forwards;
    }
    @keyframes fall {
      0% { transform:translateY(-8vh) rotate(0); opacity:1; }
      100% { transform:translateY(110vh) rotate(420deg); opacity:.15; }
    }

    .decorate-grid {
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:9px;
      margin-top:10px;
    }

    @media (max-width:720px) {
      .phone { height:97vh; border-radius:22px; }
      header { align-items:flex-start; }
      .brand h1 { font-size:11px; }
      .brand p { font-size:10px; }
      main { grid-template-columns:1fr; grid-template-rows:42% 1fr; padding:10px; gap:10px; }
      .visual, .story { border-radius:20px; }
      .story { padding:13px; }
      .text { font-size:14px; line-height:1.75; }
      footer { padding:10px; }
      button { width:100%; font-size:13px; }
      .actions { display:grid; grid-template-columns:1fr; }
      .inventory .chip:nth-child(n+6) { display:none; }
    }
  </style>
</head>

<body>
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>
  <div class="confetti" id="confetti"></div>
  <div class="toast" id="toast"></div>

  <div class="app">
    <div class="phone" role="application" aria-label="HBD Kay birthday game">
      <header>
        <div class="brand">
          <div class="badge">👾</div>
          <div>
            <h1>BIRTHDAY AGENT</h1>
            <p>極上ケーキ奪還作戦 / HBD-Kay</p>
          </div>
        </div>
        <div class="inventory" id="inventory"></div>
      </header>

      <main>
        <section class="visual" id="visual"></section>
        <section class="story">
          <div class="loc">
            <strong id="location">TITLE</strong>
            <div class="progress"><span id="progress"></span></div>
          </div>
          <div class="text" id="storyText"></div>
        </section>
      </main>

      <footer>
        <div class="actions" id="actions"></div>
      </footer>
    </div>
  </div>

  <script>
    const ITEMS = [
      ['receipt', '🧾', '雑貨屋のレシート'],
      ['mud', '👣', '泥の跡'],
      ['sparkle', '✨', '星ラメと白い毛'],
      ['strawberry', '🍓', '極上イチゴ'],
      ['key', '🔑', 'アジトの鍵'],
      ['staff', '📛', 'ラビのスタッフ証']
    ];

    const state = {
      scene: 'title',
      step: 0,
      inventory: [],
      fridgeOpen: false,
      shopTalked: false,
      parkTap: 0,
      route: '',
      candles: 5,
      deco: {
        star: false,
        ribbon: false,
        mocha: false,
        balloon: false,
        strawberry: false,
        gym: false
      }
    };

    const progressMap = {
      title: 0,
      kitchen: 12,
      map: 28,
      shop: 42,
      park: 55,
      hideout: 68,
      interview: 78,
      decorate: 90,
      party: 100,
      missionOnly: 100
    };

    const art = {
      title: ['🎂🕵️‍♀️', 'MISSION START', 'Kayのケーキが、開始5分前に消えました。はい事件。'],
      kitchen: ['🧊', 'KITCHEN / 事件現場', '冷蔵庫、空。ケーキ、消失。現実、つらい。'],
      map: ['🛰️', 'AI捜査マップ', 'AI解析中：この事件、情報量が多すぎます。'],
      shop: ['🏪🍓', '雑貨屋さん', '店主「白い耳の子？テンション高めの不審者ね」'],
      park: ['🌿👆', '近くの公園', '茂みをタップ。何が出ても責任は取りません。'],
      hideout: ['🚪🔑', '秘密のアジト前', 'ドアの向こうからクラッカー音。犯人、絶対うるさい。'],
      interview: ['🐰🎂', 'ラビ面接会場', '盗んでない。演出です。と言い張るタイプの妖精。'],
      decorate: ['🎨🍰', 'バースデー・サロン', 'ケーキをかわいく盛る。これはもう施術。'],
      party: ['🎉🎈', 'HAPPY BIRTHDAY KAY', 'ろうそくを消して、カオスかわいい誕生日を完成させよう。'],
      missionOnly: ['🎂💨', 'MISSION CLEAR?', 'ケーキは戻った。でもラビは泣いて逃げました。後味が、苦め。']
    };

    function has(item) {
      return state.inventory.includes(item);
    }

    function addItem(item) {
      if (!has(item)) {
        state.inventory.push(item);
        const found = ITEMS.find(i => i[0] === item);
        if (found) toast(`${found[1]} ${found[2]} を入手！`);
        renderInventory();
      }
    }

    function renderInventory() {
      const box = document.getElementById('inventory');
      box.innerHTML = ITEMS.map(([id, icon, label]) => {
        return `<span class="chip ${has(id) ? 'filled' : ''}" title="${label}">${has(id) ? icon : '？'}</span>`;
      }).join('');
    }

    function drawScene(key, customNote='') {
      const [emoji, label, note] = art[key] || art.title;
      document.getElementById('visual').innerHTML = `
        <div class="scene-art">
          <div class="emoji-big">${emoji}</div>
          <div class="scene-label">${label}</div>
          <div class="mini-note">${customNote || note}</div>
        </div>
      `;
    }

    function setActions(buttons) {
      document.getElementById('actions').innerHTML = buttons.map(b => {
        const cls = b.cls || 'ghost';
        const disabled = b.disabled ? ' disabled' : '';
        return `<button class="${cls}${disabled}" onclick="${b.on}">${b.text}</button>`;
      }).join('');
    }

    function setText(location, text) {
      document.getElementById('location').textContent = location;
      document.getElementById('storyText').innerHTML = text;
      document.getElementById('progress').style.width = `${progressMap[state.scene] || 0}%`;
    }

    function go(scene) {
      state.scene = scene;
      render();
    }

    function render() {
      renderInventory();

      if (state.scene === 'title') {
        drawScene('title');
        setText('TITLE SCREEN',
`【BIRTHDAY AGENT - 極上ケーキ奪還作戦】

本日はKayの誕生日。
ケーキ、キャンドル、飾り、テンション。
全部準備OK。

……のはずが、開始5分前。

<b>極上ケーキが消えました。</b>

現場に残されていたメモ：
<span class="log">MISSION STARTだよ 👾ᩚ<br>ケーキを奪還せよ。<br>ついでに、誕生日会を意味わからんくらい盛り上げろ。</span>

これは、ただの感動ストーリーではない。
ゲム式・カオスかわいい誕生日ミッションである。`);
        setActions([{ text:'🕵️ 捜査開始！Kayのケーキを奪還する', cls:'primary', on:"go('kitchen')" }]);
      }

      if (state.scene === 'kitchen') {
        drawScene('kitchen');
        const base = state.fridgeOpen
          ? `冷蔵庫を開けた。\n\n中は空。\nケーキ箱だけが、ぽつん。\n\nしかも箱の中にカードが1枚。\n<span class="log">今日の運勢：ケーキ運、暴走中。<br>ラッキーアイテム：極上イチゴ、派手なリボン、謎のスタンプ音。</span>\n現場には、レシート、泥の跡、星ラメと白い毛が落ちている。`
          : `キッチンの冷蔵庫前。\n妙に静か。こういう時の静けさはだいたいフラグ。\n\nまずは冷蔵庫を開けよう。`;
        setText('KITCHEN / 事件現場', base);

        const actions = [];
        if (!state.fridgeOpen) actions.push({ text:'🧊 冷蔵庫を開ける', cls:'primary', on:'openFridge()' });
        if (state.fridgeOpen && !has('receipt')) actions.push({ text:'🧾 レシートを拾う', cls:'blue', on:"addItem('receipt'); render()" });
        if (state.fridgeOpen && !has('mud')) actions.push({ text:'👣 泥の跡を記録する', cls:'green', on:"addItem('mud'); render()" });
        if (state.fridgeOpen && !has('sparkle')) actions.push({ text:'✨ 白い毛と星ラメを採取', cls:'primary', on:"addItem('sparkle'); render()" });
        if (has('receipt') && has('mud')) actions.push({ text:'🛰️ AI捜査マップを開く', cls:'primary', on:"go('map')" });
        setActions(actions);
      }

      if (state.scene === 'map') {
        drawScene('map');
        setText('AI SEARCH MAP',
`AI捜査マップを起動。

解析結果：
<span class="log">🧾 レシート → 雑貨屋<br>👣 泥の跡 → 公園<br>✨ 星ラメと白い毛 → 犯人、かわいい系の可能性あり。ただし油断禁止。</span>

AIからの雑なコメント：
<b>「この事件、ケーキ泥棒というよりイベント準備の匂いがします」</b>`);
        setActions([
          { text:'🏪 雑貨屋へ行く', cls:'blue', on:"go('shop')" },
          { text:'🌿 公園へ行く', cls:'green', on:"go('park')" },
          { text:'🚪 秘密のアジトへ行く', cls:'primary', on:"go('hideout')", disabled:!has('key') },
          { text:'🏡 キッチンに戻る', cls:'ghost', on:"go('kitchen')" }
        ]);
      }

      if (state.scene === 'shop') {
        drawScene('shop');
        setText('SHOP / 雑貨屋',
`雑貨屋の店主は、レシートを見てすぐにうなずいた。

「白い耳の妖精さんなら来たよ」
「買っていったもの？ えーと……」

<span class="log">・小さなろうそく<br>・派手なリボン<br>・星型ラメ<br>・うさぎ用クラッカー<br>・なぜか麻婆豆腐の素</span>

意味がわからない。
でも、Kayの誕生日を普通に終わらせる気がないことだけは分かった。

店主はさらに、ラビの好物らしい<b>極上イチゴ</b>をくれた。`);
        if (!has('strawberry')) addItem('strawberry');
        state.shopTalked = true;
        setActions([
          { text:'📍 マップへ戻る', cls:'primary', on:"go('map')" },
          { text:'🌿 ついでに公園を調べる', cls:'green', on:"go('park')" }
        ]);
      }

      if (state.scene === 'park') {
        drawScene('park', state.parkTap ? `茂み調査：${state.parkTap}/3。もうすでに嫌な予感しかしない。` : '');
        let text = `公園の奥に、やたらカラフルな茂みがある。\n\n普通の茂みではない。\n<b>イベントの匂いがする茂み</b>だ。`;
        if (state.parkTap === 1) text += `\n\n1回目。\n<span class="log">突然、爆音スタンプが鳴った。<br>KayならたぶんちょっとJUMPする。</span>`;
        if (state.parkTap === 2) text += `\n\n2回目。\n<span class="log">紙吹雪が爆発した。<br>誰だ、ここに演出を仕込んだの。</span>`;
        if (state.parkTap >= 3) text += `\n\n3回目。\n茂みの奥から光る鍵と、破れた招待状が出てきた。\n<span class="log">「だれかと食べたい。でも普通の誕生日じゃつまらない」</span>\n犯人、たぶん寂しい。\nそして、たぶん面倒くさい。`;
        setText('PARK / 公園', text);

        const actions = [];
        if (state.parkTap < 3) actions.push({ text:'🌿 茂みをタップする', cls:'green', on:'tapBush()' });
        if (state.parkTap >= 3 && !has('key')) actions.push({ text:'🔑 アジトの鍵を拾う', cls:'primary', on:"addItem('key'); render()" });
        actions.push({ text:'📍 マップへ戻る', cls:'ghost', on:"go('map')" });
        if (has('key')) actions.push({ text:'🚪 アジトへ直行', cls:'blue', on:"go('hideout')" });
        setActions(actions);
      }

      if (state.scene === 'hideout') {
        drawScene('hideout');
        setText('HIDEOUT / アジト前',
`路地の奥に、手作りの小さなドア。

ドアの外には飾りがある。

<span class="log">星の紙飾り。<br>カラフルな旗。<br>小さな気球の絵。<br>「スタッフ以外立ち入り禁止」の紙。<br>ただし字がぷるぷる。</span>

中から声がする。

「盗んでないです。演出です」

……完全にいる。`);
        setActions([
          { text:'🔑 アジトへ突入する', cls:'primary', on:"go('interview')", disabled:!has('key') },
          { text:'📍 マップへ戻る', cls:'ghost', on:"go('map')" }
        ]);
      }

      if (state.scene === 'interview') {
        drawScene('interview');
        setText('RABBI / ラビ採用面接',
`アジトの中には、ケーキを抱えたウサギ妖精・ラビ。

ラビは堂々と言った。

<span class="log">「盗んでない。サプライズの事前回収です」<br>「Kayの誕生日が普通でいいわけないじゃん？」<br>「星、気球、ケーキ、クラッカー。勝ちです」<br>「麻婆豆腐の素は……勢いで買った」</span>

どう考えても迷惑。
でも、悪意はない。

ここは説得ではない。
<b>採用面接</b>だ。`);
        setActions([
          { text:'😠 怒ってケーキだけ取り返す', cls:'red', on:'forceReclaim()' },
          { text:'🍓 極上イチゴで落ち着かせる', cls:'green', on:'giveStrawberry()', disabled:!has('strawberry') },
          { text:'📛 ラビを暴走演出スタッフに採用する', cls:'primary', on:'hireLabi()' }
        ]);
      }

      if (state.scene === 'decorate') {
        drawScene('decorate', cakePreview());
        const routeLine = state.route === 'strawberry'
          ? '極上イチゴでラビは落ち着き、正式にケーキを返した。'
          : 'ラビは「採用……？」と目を輝かせ、正式にケーキを返した。';
        setText('DECORATION / ケーキ施術',
`${routeLine}

ここからはバースデー・サロンタイム。

ケーキをKay仕様に盛る。
かわいく、派手に、ちょっと意味わからないくらいに。

現在の仕上がり：
<span class="log">${cakePreview()}</span>`);
        setActions([
          { text:'✨ 星キャンドル', cls: state.deco.star ? 'primary' : 'ghost', on:"toggleDeco('star')" },
          { text:'🎀 派手リボン', cls: state.deco.ribbon ? 'primary' : 'ghost', on:"toggleDeco('ribbon')" },
          { text:'☕ カフェモカクリーム', cls: state.deco.mocha ? 'primary' : 'ghost', on:"toggleDeco('mocha')" },
          { text:'🎈 小さな気球ピック', cls: state.deco.balloon ? 'primary' : 'ghost', on:"toggleDeco('balloon')" },
          { text:'🍓 極上イチゴ増量', cls: state.deco.strawberry ? 'primary' : 'ghost', on:"toggleDeco('strawberry')" },
          { text:'💪 代謝上げメモ', cls: state.deco.gym ? 'primary' : 'ghost', on:"toggleDeco('gym')" },
          { text:'🎉 完成！パーティー開始', cls:'green', on:"go('party')" }
        ]);
      }

      if (state.scene === 'party') {
        drawScene('party');
        const candleLine = state.candles > 0
          ? `残りのろうそく：<b>${state.candles}</b>本\n\n1本ずつタップして消そう。`
          : `ろうそく、全消灯。\n紙吹雪、爆発。\nラビ、クラッカー暴発。\n\n完璧ではない。\nでも、めちゃくちゃ楽しい。`;

        setText('MISSION COMPLETE',
`✨🎉 MISSION COMPLETE !! 🎉✨

極上ケーキ、奪還成功。
ラビ、泥棒妖精から<b>暴走演出スタッフ</b>へ昇格。
Kayの誕生日会、無事にカオスかわいく大成功。

<span class="log">${cakePreview()}</span>

${candleLine}

${state.candles === 0 ? `Kayへ。\n\n新しい1年が、優しさと笑いと、ちょっと意味わからないワクワクでいっぱいになりますように。\n\n困ったことがあったら、いつでもバースデー・エージェントを呼んでください。\nたぶん来ます。\nスタンプ鳴らしながら。👾ᩚ` : ''}`);
        const buttons = [];
        if (state.candles > 0) buttons.push({ text:'🕯️ ろうそくを1本消す', cls:'primary', on:'blowCandle()' });
        buttons.push({ text:'🔄 もう一度遊ぶ', cls:'ghost', on:'resetGame()' });
        setActions(buttons);
      }

      if (state.scene === 'missionOnly') {
        drawScene('missionOnly');
        setText('MISSION ONLY CLEAR',
`ケーキは取り戻した。

任務だけなら成功。
でも、ラビは泣きながら逃げた。

<span class="log">AI評価：ケーキ奪還 100点。<br>誕生日のワクワク 42点。<br>後味：ビター。</span>

誕生日は、ケーキを守るだけの日じゃない。
笑えて、かわいくて、最後にちゃんと嬉しければ勝ち。`);
        setActions([
          { text:'↩️ 面接からやり直す', cls:'primary', on:"go('interview')" },
          { text:'🔄 最初から遊ぶ', cls:'ghost', on:'resetGame()' }
        ]);
      }
    }

    function openFridge() {
      state.fridgeOpen = true;
      toast('冷蔵庫オープン。ケーキ、いません。');
      render();
    }

    function tapBush() {
      state.parkTap += 1;
      if (state.parkTap === 1) toast('爆音スタンプ！JUMP案件。');
      if (state.parkTap === 2) burstConfetti(22);
      if (state.parkTap >= 3) toast('鍵と招待状を発見！');
      render();
    }

    function giveStrawberry() {
      state.route = 'strawberry';
      toast('ラビ「いちご……採用です」');
      addItem('staff');
      go('decorate');
    }

    function hireLabi() {
      state.route = 'hired';
      toast('ラビ、暴走演出スタッフに採用。');
      addItem('staff');
      go('decorate');
    }

    function forceReclaim() {
      state.route = 'forced';
      state.scene = 'missionOnly';
      render();
    }

    function toggleDeco(key) {
      state.deco[key] = !state.deco[key];
      render();
    }

    function cakePreview() {
      const parts = [];
      if (state.deco.star) parts.push('星キャンドル');
      if (state.deco.ribbon) parts.push('派手リボン');
      if (state.deco.mocha) parts.push('カフェモカクリーム');
      if (state.deco.balloon) parts.push('気球ピック');
      if (state.deco.strawberry) parts.push('極上イチゴ増量');
      if (state.deco.gym) parts.push('「食べたら動く」メモ');
      return parts.length ? `🎂 Kay仕様：${parts.join(' / ')}` : '🎂 まだシンプル。かわいいけど、ゲム式にはもう少し暴れたい。';
    }

    function blowCandle() {
      if (state.candles > 0) {
        state.candles -= 1;
        burstConfetti(state.candles === 0 ? 120 : 18);
        if (state.candles === 0) toast('HAPPY BIRTHDAY KAY!!');
        render();
      }
    }

    function burstConfetti(count=60) {
      const box = document.getElementById('confetti');
      const colors = ['#ff6fae','#ffd166','#65c7f7','#77dd77','#a78bfa','#ff6b6b'];
      for (let i = 0; i < count; i++) {
        const el = document.createElement('i');
        el.className = 'piece';
        el.style.left = Math.random() * 100 + 'vw';
        el.style.top = '-20px';
        el.style.background = colors[Math.floor(Math.random() * colors.length)];
        el.style.animationDelay = (Math.random() * .25) + 's';
        el.style.transform = `rotate(${Math.random() * 180}deg)`;
        box.appendChild(el);
        setTimeout(() => el.remove(), 1600);
      }
    }

    function toast(message) {
      const el = document.getElementById('toast');
      el.textContent = message;
      el.classList.add('show');
      clearTimeout(window.__toastTimer);
      window.__toastTimer = setTimeout(() => el.classList.remove('show'), 1600);
    }

    function resetGame() {
      state.scene = 'title';
      state.step = 0;
      state.inventory = [];
      state.fridgeOpen = false;
      state.shopTalked = false;
      state.parkTap = 0;
      state.route = '';
      state.candles = 5;
      state.deco = { star:false, ribbon:false, mocha:false, balloon:false, strawberry:false, gym:false };
      burstConfetti(40);
      render();
    }

    render();
  </script>
</body>
</html>
